# Render Blueprint — ONE web service that builds the React admin app and serves
# it from the Express backend (single URL, no CORS, one-click deploy).
# Deploy: Render dashboard → New + → Blueprint → pick this repo.
# Secrets (sync:false) are entered once in the Render dashboard, never in git.
services:
  - type: web
    name: whatsapp-app
    runtime: node
    region: frankfurt # same region as the Supabase project (eu-central)
    plan: free # upgrade to "starter" to avoid free-tier cold starts on the webhook
    buildCommand: cd frontend && npm ci && npm run build && cd ../backend && npm ci
    startCommand: cd backend && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      # ── Database / Supabase ──
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: voice-notes
      # ── Auth ──
      - key: JWT_SECRET
        generateValue: true # Render generates a strong secret on first deploy
      - key: JWT_EXPIRES_IN
        value: 7d
      # ── OpenAI ──
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      # ── WhatsApp Cloud API ──
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_API_VERSION
        value: v21.0
      # ── Public URL (set to this service's URL after first deploy) ──
      - key: PUBLIC_BASE_URL
        sync: false
      # ── Legal pages (Meta app token) ──
      - key: LEGAL_APP_NAME
        value: WhatsApp Business AI Agent
      - key: LEGAL_COMPANY_NAME
        sync: false
      - key: LEGAL_CONTACT_EMAIL
        sync: false
      - key: LEGAL_WEBSITE_URL
        sync: false
      - key: LEGAL_EFFECTIVE_DATE
        value: "2026-06-09"
