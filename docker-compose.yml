services:
  db:
    image: postgres:16-alpine
    container_name: wa_agent_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: wa_agent
      POSTGRES_PASSWORD: wa_agent
      POSTGRES_DB: wa_agent
    ports:
      - "5432:5432"
    volumes:
      - wa_agent_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wa_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  wa_agent_pgdata:
